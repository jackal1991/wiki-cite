agent:
  model: "claude-sonnet-5"
  max_edits_per_article: 15
  max_candidates_per_fetch: 8    # cost guard: max Claude analyses per "Fetch New Article" (one call per candidate scanned)
  max_search_turns: 5            # cost guard: max tool-executing model calls per article in the agentic search loop
  search_results_per_query: 3    # cap results returned per search tool call, keeps tool_result payloads small

guardrails:
  max_new_words: 50           # Excluding citations/templates
  max_content_removal_pct: 20
  min_similarity_ratio: 0.85
  skip_blp_articles: true
  relax_blp_when_topic_filtered: false  # opt-in: only when an include_categories filter is active, allow BLP articles (WP:BLP is strict — keep off unless deliberately scoping a topic)

sources:
  search_apis:
    - semantic_scholar
    - crossref
    - web_search       # general web/news search via Brave Search API (BRAVE_API_KEY)
  reliability_check: true

wikipedia:
  edit_summary_suffix: "(AI-assisted citation/cleanup, human-reviewed)"
  rate_limit_edits_per_hour: 10
  user_agent: "WikiCiteBot/1.0 (hyphens.fable.4v@icloud.com; citation-cleanup-assistant)"

article_selection:
  # Tracking category for inline {{Citation needed}} tags (the Citation Hunt signal):
  # main-namespace articles with at least one specific claim flagged as unsourced.
  category: "Category:All_articles_with_unsourced_statements"
  max_body_lines: 4        # retained for reporting; selection now gates on {{Citation needed}} presence
  exclude_blp: true
  exclude_protected: true
  max_wikitext_chars: 12000  # cost guard: skip articles longer than this so no single Claude prompt is huge
  candidate_pool_size: 30    # look-ahead pool size (>= limit) that the feedback scorer ranks before yielding
  category_start_prefix: "A" # skip ahead of the numeral/punctuation-titled pages MediaWiki's default sortkey order lists first

feedback:
  enabled: true
  epsilon: 0.15       # exploration jitter added to every candidate score
  min_samples: 5      # dimension values below this sample count get the neutral 0.5 prior
